# docker-compose.yml
version: '3.8'

services:
  cpu-high-app:
    build: .
    container_name: cpu-high-demo
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m -XX:+PrintGCDetails -XX:+PrintGCDateStamps -Xloggc:/tmp/gc.log
    mem_limit: 1g
    cpus: 0.5
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped